<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>α−HERIX Board</title>

<style>
:root{
  --engine:#b24a4a;
  --engine-dark:#7b1b1b;
  --border:#ddd;
}
body{ margin:0; font-family:-apple-system,system-ui; }

.bar{
  display:flex; flex-wrap:wrap; gap:8px;
  padding:8px;
  border-bottom:1px solid var(--border);
  background:#fafafa;
}

button{
  padding:6px 12px;
  border-radius:10px;
  border:1px solid var(--engine-dark);
  background:var(--engine);
  color:#fff;
  cursor:pointer;
}

button.secondary{
  background:#fff;
  color:var(--engine-dark);
  border:1px solid var(--border);
}

canvas{
  position:absolute;
  left:0; top:0;
  touch-action:none;
}

.stage{
  position:relative;
  width:100vw;
}
</style>
</head>

<body>

<div class="bar">
  <select id="classSelect">
    <option value="Serino">Serino</option>
    <option value="Kanzan">Kanzan</option>
    <option value="Kie">Kie</option>
    <option value="Koreyama">Koreyama</option>
  </select>

  <button id="clearBtn" class="secondary">全消去</button>
  <button id="saveBtn">PNG保存</button>

  <span id="syncLabel">Sync: on</span>
</div>

<div class="stage">
  <canvas id="board"></canvas>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0XWP8mNvpFR_Xo71eAoQVSE8a2FFQKAA",
  authDomain: "alfaherix-board.firebaseapp.com",
  projectId: "alfaherix-board",
  storageBucket: "alfaherix-board.firebasestorage.app",
  messagingSenderId: "1066686621657",
  appId: "1:1066686621657:web:cc2dc2840811e060801bc8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const syncLabel = document.getElementById("syncLabel");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 60;
}
window.addEventListener("resize", resize);
resize();

let drawing = false;
let strokes = [];
let currentStroke = [];

canvas.addEventListener("pointerdown", e=>{
  if(e.pointerType !== "pen") return;
  drawing = true;
  currentStroke = [{x:e.offsetX, y:e.offsetY}];
});

canvas.addEventListener("pointermove", e=>{
  if(!drawing) return;
  currentStroke.push({x:e.offsetX, y:e.offsetY});
  redraw();
});

canvas.addEventListener("pointerup", ()=>{
  if(!drawing) return;
  drawing = false;
  strokes.push(currentStroke);
  save();
});

function redraw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  ctx.strokeStyle = "#000";

  for(const s of strokes){
    ctx.beginPath();
    ctx.moveTo(s[0].x, s[0].y);
    for(let i=1;i<s.length;i++){
      ctx.lineTo(s[i].x, s[i].y);
    }
    ctx.stroke();
  }

  if(currentStroke.length){
    ctx.beginPath();
    ctx.moveTo(currentStroke[0].x, currentStroke[0].y);
    for(let i=1;i<currentStroke.length;i++){
      ctx.lineTo(currentStroke[i].x, currentStroke[i].y);
    }
    ctx.stroke();
  }
}

function boardRef(){
  const className = document.getElementById("classSelect").value;
  return ref(db, "boards/"+className);
}

function save(){
  set(boardRef(), strokes)
    .then(()=> syncLabel.textContent="Sync: on")
    .catch(()=> syncLabel.textContent="Sync: error");
}

onValue(boardRef(), snap=>{
  const data = snap.val();
  if(data){
    strokes = data;
    redraw();
  }
});

document.getElementById("classSelect").addEventListener("change", ()=>{
  onValue(boardRef(), snap=>{
    const data = snap.val();
    strokes = data || [];
    redraw();
  });
});

document.getElementById("clearBtn").onclick = ()=>{
  strokes = [];
  redraw();
  save();
};

document.getElementById("saveBtn").onclick = ()=>{
  const link = document.createElement("a");
  link.download = "board.png";
  link.href = canvas.toDataURL();
  link.click();
};

</script>
</body>
</html>
