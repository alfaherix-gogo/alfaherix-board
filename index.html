<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0XWP8mNvpFR_Xo71eAoQVSE8a2FFQKAA",
  authDomain: "alfaherix-board.firebaseapp.com",
  projectId: "alfaherix-board",
  storageBucket: "alfaherix-board.firebasestorage.app",
  messagingSenderId: "1066686621657",
  appId: "1:1066686621657:web:cc2dc2840811e060801bc8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const syncLabel = document.getElementById("syncLabel");
const classSelect = document.getElementById("classSelect");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 60;
}
window.addEventListener("resize", resize);
resize();

let drawing = false;
let strokes = [];
let currentStroke = [];
let unsubscribe = null;

function redraw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  ctx.strokeStyle = "#000";

  for(const s of strokes){
    ctx.beginPath();
    ctx.moveTo(s[0].x, s[0].y);
    for(let i=1;i<s.length;i++){
      ctx.lineTo(s[i].x, s[i].y);
    }
    ctx.stroke();
  }

  if(currentStroke.length){
    ctx.beginPath();
    ctx.moveTo(currentStroke[0].x, currentStroke[0].y);
    for(let i=1;i<currentStroke.length;i++){
      ctx.lineTo(currentStroke[i].x, currentStroke[i].y);
    }
    ctx.stroke();
  }
}

function currentRef(){
  return ref(db, "boards/" + classSelect.value);
}

function listen(){
  if(unsubscribe) unsubscribe();

  const r = currentRef();

  const callback = snap=>{
    const data = snap.val();
    strokes = data || [];
    redraw();
  };

  onValue(r, callback);
  unsubscribe = ()=> off(r);
}

function save(){
  set(currentRef(), strokes)
    .then(()=> syncLabel.textContent="Sync: on")
    .catch(()=> syncLabel.textContent="Sync: error");
}

canvas.addEventListener("pointerdown", e=>{
  if(e.pointerType !== "pen") return;
  drawing = true;
  currentStroke = [{x:e.offsetX, y:e.offsetY}];
});

canvas.addEventListener("pointermove", e=>{
  if(!drawing) return;
  currentStroke.push({x:e.offsetX, y:e.offsetY});
  redraw();
});

canvas.addEventListener("pointerup", ()=>{
  if(!drawing) return;
  drawing = false;
  strokes.push(currentStroke);
  currentStroke = [];
  save();
});

classSelect.addEventListener("change", ()=>{
  strokes = [];
  redraw();
  listen();
});

document.getElementById("clearBtn").onclick = ()=>{
  strokes = [];
  redraw();
  save();
};

document.getElementById("saveBtn").onclick = ()=>{
  const link = document.createElement("a");
  link.download = "board.png";
  link.href = canvas.toDataURL();
  link.click();
};

listen();

</script>
